<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="page.title.policy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Studios</title>
  <link rel="stylesheet" href="{{CDN_URL}}/fonts/fonts.css">
  <link rel="stylesheet" href="/shared/css/general.css">
  <link rel="stylesheet" href="/policy/assets/css/policy.css">
</head>
<body>
  {{HEADER}}

  <!-- 政策导航 -->
  <nav class="policy-nav">
    <div class="policy-nav-items">
      <a href="#privacy" class="policy-nav-item" data-policy="privacy" data-i18n="policy.privacyPolicy"></a>
      <a href="#terms" class="policy-nav-item" data-policy="terms" data-i18n="policy.termsOfService"></a>
      <a href="#cookies" class="policy-nav-item" data-policy="cookies" data-i18n="policy.cookiePolicy"></a>
    </div>
    <div class="language-switcher version-switcher is-hidden" role="listbox">
      <button class="language-current" aria-haspopup="listbox" aria-expanded="false">
        <span class="lang-text"></span>
        <svg class="lang-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="language-dropdown" role="listbox">
        <!-- 版本选项由 JS 动态生成 -->
      </div>
    </div>
  </nav>
  
  <!-- 政策内容容器 -->
  <main class="policy-container">
    <div class="policy-loading">
      <div class="loader-spinner"></div>
    </div>
    <div class="policy-content" translate="no"></div>
      <!-- 内容由 JS 动态渲染 -->
    </div>
  </main>

  <div class="page-footer" data-i18n="footer.copyright" translate="no"></div>

  <script type="module" src="/policy/assets/js/policy.js"></script>
  <script type="module" src="/shared/js/translations.js"></script>
  <script type="module" src="/shared/js/cookie-consent.js"></script>
  <script src="{{CDN_URL}}/js/purify.@3.4.0.min.js.br"></script>
</body>
</html>
