<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="page.title.home">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEBULA STUDIOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;400;700;900&family=Azeret+Mono:wght@300;400&family=Newsreader:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/css/general.css" />
  <link rel="stylesheet" href="/home/assets/css/home.css" />
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  {{HEADER}}

  <section class="hero">
    <div class="hero-left">
      <h1 class="hero-title" translate="no">
        ONE<br>
        IDENTITY<br>
        <em>Everywhere</em>
      </h1>
      <p class="hero-desc" data-i18n="hero.description">
      </p>
      <div class="hero-cta">
        <a class="button-primary" href="/account/register" data-i18n="hero.createAccount"></a>
        <a class="button-secondary" href="/account/login" data-i18n="hero.login"></a>
      </div>
    </div>

    <div class="hero-right">
      <div class="nebula-graphic">
        <div class="nebula-ring"></div>
        <div class="nebula-ring"></div>
        <div class="nebula-ring"></div>
        <div class="nebula-ring"></div>
        <div class="nebula-dot"></div>

        <svg class="nebula-stars" viewBox="0 0 360 360">
          <circle cx="60" cy="80" r="1" fill="#f0ede8" opacity="0.5"/>
          <circle cx="300" cy="120" r="1.5" fill="#f0ede8" opacity="0.35"/>
          <circle cx="40" cy="280" r="1" fill="#f0ede8" opacity="0.4"/>
          <circle cx="320" cy="300" r="1" fill="#f0ede8" opacity="0.3"/>
          <circle cx="180" cy="30" r="1" fill="#f0ede8" opacity="0.6"/>
          <circle cx="100" cy="340" r="1.5" fill="#f0ede8" opacity="0.25"/>
          <circle cx="280" cy="60" r="1" fill="#f0ede8" opacity="0.45"/>
          <circle cx="200" cy="310" r="1" fill="#f0ede8" opacity="0.3"/>
          <circle cx="340" cy="200" r="1.5" fill="#f0ede8" opacity="0.35"/>
          <circle cx="20" cy="160" r="1" fill="#f0ede8" opacity="0.4"/>
          <line x1="178" y1="179" x2="182" y2="179" stroke="#f0ede8" stroke-width="0.5" opacity="0.6"/>
          <line x1="180" y1="177" x2="180" y2="183" stroke="#f0ede8" stroke-width="0.5" opacity="0.6"/>
        </svg>
      </div>

      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-num" translate="no">99.9%</span>
          <span class="stat-label" data-i18n="stats.availability"></span>
        </div>
        <div class="stat-item">
          <span class="stat-num" translate="no">&lt; 80ms</span>
          <span class="stat-label" data-i18n="stats.authResponse"></span>
        </div>
      </div>
    </div>
  </section>

  <div class="ticker" id="ticker">
    <div class="ticker-inner" id="ticker-inner">
      <span class="ticker-item" translate="no">NEBULA</span>
    </div>
  </div>

  <section class="features" id="features">
    <div class="section-header">
      <div class="reveal">
        <p class="section-label" data-i18n="features.label"></p>
        <h2 class="section-title" translate="no">Everything<br>You <em>Need</em></h2>
      </div>
      <p class="section-body reveal reveal-delay-2" data-i18n="features.description">
      </p>
    </div>

    <div class="feature-grid">
      <div class="feature-card reveal">
        <p class="feature-number" translate="no">01</p>
        <div class="feature-icon">
          <svg viewBox="0 0 36 36">
            <rect x="8" y="16" width="20" height="16" rx="0"/>
            <path d="M12 16V11a6 6 0 0 1 12 0v5"/>
            <circle cx="18" cy="24" r="2"/>
          </svg>
        </div>
        <h3 class="feature-name" data-i18n="feature.identitySecurity.name"></h3>
        <p class="feature-desc" data-i18n="feature.identitySecurity.desc"></p>
      </div>

      <div class="feature-card reveal reveal-delay-1">
        <p class="feature-number" translate="no">02</p>
        <div class="feature-icon">
          <svg viewBox="0 0 36 36">
            <circle cx="18" cy="12" r="5"/>
            <path d="M6 30c0-6.627 5.373-8 12-8s12 1.373 12 8"/>
          </svg>
        </div>
        <h3 class="feature-name" data-i18n="feature.profile.name"></h3>
        <p class="feature-desc" data-i18n="feature.profile.desc"></p>
      </div>

      <div class="feature-card reveal reveal-delay-2">
        <p class="feature-number" translate="no">03</p>
        <div class="feature-icon">
          <svg viewBox="0 0 36 36">
            <path d="M10 18 L26 18 M18 10 L26 18 L18 26"/>
            <rect x="4" y="4" width="28" height="28" rx="0"/>
          </svg>
        </div>
        <h3 class="feature-name" data-i18n="feature.thirdParty.name"></h3>
        <p class="feature-desc" data-i18n="feature.thirdParty.desc"></p>
      </div>

      <div class="feature-card reveal">
        <p class="feature-number" translate="no">04</p>
        <div class="feature-icon">
          <svg viewBox="0 0 36 36">
            <path d="M4 8h6v6H4z M4 22h6v6H4z M14 11h18 M14 25h18"/>
          </svg>
        </div>
        <h3 class="feature-name" data-i18n="feature.activityLog.name"></h3>
        <p class="feature-desc" data-i18n="feature.activityLog.desc"></p>
      </div>

      <div class="feature-card reveal reveal-delay-1">
        <p class="feature-number" translate="no">05</p>
        <div class="feature-icon">
          <svg viewBox="0 0 36 36">
            <rect x="8" y="4" width="20" height="28" rx="0"/>
            <path d="M14 10h8 M14 16h8 M14 22h5"/>
          </svg>
        </div>
        <h3 class="feature-name" data-i18n="feature.microsoft.name"></h3>
        <p class="feature-desc" data-i18n="feature.microsoft.desc"></p>
      </div>

      <div class="feature-card reveal reveal-delay-2">
        <p class="feature-number" translate="no">06</p>
        <div class="feature-icon">
          <svg viewBox="0 0 36 36">
            <path d="M18 4 L18 24 M10 16 L18 24 L26 16"/>
            <path d="M6 30 L30 30"/>
          </svg>
        </div>
        <h3 class="feature-name" data-i18n="feature.dataExport.name"></h3>
        <p class="feature-desc" data-i18n="feature.dataExport.desc"></p>
      </div>
    </div>
  </section>

  <section class="manifesto" id="about">
    <div class="manifesto-left reveal">
      <div class="manifesto-quote" translate="no">
        YOUR<br>
        <span class="accent">DATA</span><br>
        YOUR<br>
        RULES
      </div>
    </div>
    <div class="manifesto-right">
      <p class="manifesto-text reveal">
        <span data-i18n="manifesto.text1.before"></span>
        <strong data-i18n="manifesto.text1.strong"></strong>
        <span data-i18n="manifesto.text1.after"></span>
      </p>
      <p class="manifesto-text reveal reveal-delay-1">
        <span data-i18n="manifesto.text2.before"></span>
        <strong data-i18n="manifesto.text2.strong"></strong>
        <span data-i18n="manifesto.text2.after"></span>
      </p>
      <p class="manifesto-text reveal reveal-delay-2">
        <span data-i18n="manifesto.text3.part1"></span>
        <strong data-i18n="manifesto.text3.strong1"></strong>
        <span data-i18n="manifesto.text3.part2"></span>
        <strong data-i18n="manifesto.text3.strong2"></strong>
        <span data-i18n="manifesto.text3.part3"></span>
      </p>
    </div>
  </section>

  <section class="cta-section">
    <div class="cta-title reveal" translate="no">
      Start<br>
      <em>Today</em><br>
      Free
    </div>
    <div class="cta-right reveal reveal-delay-2">
      <p class="cta-sub" data-i18n="cta.description">
      </p>
      <div class="cta-actions">
        <a class="button-primary" href="/account/register" data-i18n="cta.registerNow"></a>
        <a class="button-secondary" href="/account/login" data-i18n="cta.alreadyHaveAccount"></a>
      </div>
    </div>
  </section>

  <footer class="home-footer">
    <span class="footer-logo" translate="no">Nebula Studios</span>
    <div class="footer-links">
      <a class="footer-link" href="/policy#privacy" data-i18n="policy.privacyPolicy"></a>
      <a class="footer-link" href="/policy#terms" data-i18n="policy.termsOfService"></a>
      <a class="footer-link" href="/policy#cookies" data-i18n="policy.cookiePolicy"></a>
    </div>
    <div class="page-footer" data-i18n="footer.copyright" translate="no"></div>
  </footer>

  <script type="module" src="/home/assets/js/home.js"></script>
  <script type="module" src="/shared/js/translations.js"></script>
  <script type="module" src="/shared/js/cookie-consent.js"></script>
</body>
</html>
