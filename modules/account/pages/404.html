<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="page.title.notFound">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;700;900&family=Newsreader:ital,opsz,wght@1,6,200;1,6,300&family=Azeret+Mono:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/css/general.css">
  <link rel="stylesheet" href="/account/assets/css/common.css">
</head>
<body>
  {{HEADER}}
  
  <!-- 页面加载遮罩 -->
  <div id="page-loader" class="page-loader">
    <div class="loader-spinner"></div>
  </div>
  
  <div class="card">
    <div class="card-num" translate="no">404</div>
    <h1 class="card-title" data-i18n="notFound.title"></h1>
    <p class="subtitle" data-i18n="notFound.message"></p>
    
    <button type="button" id="back-btn" class="button-primary" data-i18n="notFound.backToLogin"></button>
  </div>
  <div class="policy-links">
    <a href="/policy#privacy" data-i18n="policy.privacyPolicy"></a>
    <span>|</span>
    <a href="/policy#terms" data-i18n="policy.termsOfService"></a>
  </div>
  <div class="page-footer" data-i18n="footer.copyright" translate="no"></div>

  <script type="module" src="/account/assets/js/404.js"></script>
  <script type="module" src="/shared/js/translations.js"></script>
  <script type="module" src="/shared/js/cookie-consent.js"></script>
</body>
</html>
